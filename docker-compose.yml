services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15
    container_name: colegio_postgres
    environment:
      POSTGRES_DB: colegiodb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - colegio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d colegiodb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # API .NET 8 (Backend)
  backend:
    build:
      context: ./back-end/APIColegio/APIColegio
      dockerfile: Dockerfile
    container_name: colegio_backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=colegiodb;Username=postgres;Password=admin;Port=5432
      - ApiKey=colegio-api-key-2025
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - colegio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: colegio_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - colegio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    driver: local

networks:
  colegio-network:
    driver: bridge
